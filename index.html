<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> V3RII WMS SYSTEM</title>
    <script>
      (function() {
        const useCustomBrandThemes = localStorage.getItem('vite-ui-wms-use-custom-brand-themes') === 'true';
        const theme = localStorage.getItem('vite-ui-theme') || 'system';
        const root = document.documentElement;

        if (useCustomBrandThemes) {
          const brandTheme = localStorage.getItem('vite-ui-wms-brand-theme') || 'v3rii';
          const lightThemes = new Set(['cleanLight', 'flatNavy', 'flatSlate', 'flatWhite']);
          const resolvedTheme = lightThemes.has(brandTheme) ? 'light' : 'dark';
          root.classList.add(resolvedTheme);

          const classMap = {
            v3rii: 'theme-v3rii',
            warehouseBlue: 'theme-warehouse-blue',
            industrialSteel: 'theme-industrial-steel',
            safetyGreen: 'theme-safety-green',
            forkliftAmber: 'theme-forklift-amber',
            graphite: 'theme-graphite',
            executive: 'theme-executive',
            burgundy: 'theme-burgundy',
            cleanLight: 'theme-clean-light',
            highContrast: 'theme-high-contrast',
            flatNavy: 'theme-flat-navy',
            flatSlate: 'theme-flat-slate',
            flatWhite: 'theme-flat-white',
          };
          root.classList.add(classMap[brandTheme] || 'theme-v3rii');
          root.dataset.brandTheme = brandTheme;
          return;
        }

        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          root.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
